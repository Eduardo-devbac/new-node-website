<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <title>Formulario</title>

    <!-- CSS CORREGIDO -->
    <link rel="stylesheet" href="./public/styles/estilos.css" />

    <!-- JS CORREGIDO -->
    <script src="./public/js/config.js" defer></script>
    <script src="./public/js/functions.js" defer></script>
  </head>

  <body>
    <div class="agrupar">
      <header class="header">
        <nav class="menu">
          <ul>
            <li><a href="./index.html">historia</a></li>
            <li><a href="./beneficios.html">beneficios</a></li>

            <li><a href="./tienda.html">tienda</a></li>
            <li><a href="./perfil.html">perfil</a></li>
          </ul>
        </nav>
      </header>

      <section class="seccion">
        <hgroup>
          <h1 class="title">Formulario de registro</h1>

          <form id="formulario" method="post">
            <ul>
              <li>
                <label for="name_user">Nombre:</label>
                <input
                  type="text"
                  name="name"
                  class="input"
                  required
                  placeholder="name"
                  autofocus
                />
              </li>

              <li>
                <label for="mail">Correo electrónico:</label>
                <input
                  type="email"
                  name="mail"
                  class="input"
                  minlength="8"
                  required
                  placeholder="mail"
                />
              </li>

              <li>
                <label for="password">Contraseña:</label>
                <input
                  type="password"
                  name="password"
                  class="input"
                  minlength="8"
                  required
                  placeholder="password"
                />

                <label for="modalidad">Modalidad que practicas:</label>
                <input
                  type="text"
                  name="modality"
                  class="input"
                  maxlength="12"
                  placeholder="modality"
                  required
                />
              </li>
            </ul>

            <button class="btn" type="submit">Enviar</button>
          </form>
        </hgroup>

        <div id="respuesta-formualrio"></div>
      </section>

      <footer class="pie">DERECHOS RESERVADOS 2022-2023</footer>
    </div>
  </body>
</html>
