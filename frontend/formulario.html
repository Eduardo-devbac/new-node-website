    <meta charset="UTF-8" />

    <!-- CSS CORREGIDO -->

    <!-- JS CORREGIDO -->
    <script src="/public/js/config.js" defer></script>
    <script src="/public/js/functions.js" defer></script>
  </head>

  <body>
    <div class="agrupar">
      <header class="header">
        <nav class="menu">
          <ul>
            <li><a href="./index.html">historia</a></li>
            <li><a href="./beneficios.html">beneficios</a></li>

            <li><a href="./formulario-sesion.html">iniciar sesion</a></li>
            <a href="/perfil">perfil</a>
          </ul>
        </nav>
      </header>

      <section class="seccion">
        <hgroup>
          <h1 class="title">Formulario de registro</h1>

          <form id="formulario" method="post" action="/registro">
            <ul>
              <li>
                <label for="name_user">Nombre:</label>
                <input
                  type="text"
                  name="name"
                  class="input"
                  required
                  placeholder="name"
                  autofocus
                />
              </li>

              <li>
                <label for="mail">Correo electrónico:</label>
                <input
                  type="email"
                  name="mail"
                  class="input"
                  minlength="8"
                  required
                  placeholder="mail"
                />
              </li>

              <li>
                <label for="password">Contraseña:</label>

                <div class="password-wrapper">
                  <input
                    type="password"
                    name="password"
                    id="password"
                    class="input"
                    minlength="8"
                    required
                    placeholder="password"
                  />

                  <span id="togglePassword" class="eye-icon"></span>
                </div>
                <div class="input-group">
                  <label for="modality">Modalidad</label>
                  <select
                    id="modality"
                    name="modality"
                    class="select-modalidad"
                    required
                  >
                    <option value="" disabled selected>
                      Selecciona una modalidad
                    </option>
                    <option value="XC">XC</option>
                    <option value="Enduro">Enduro</option>
                    <option value="Downhill">Downhill</option>
                    <option value="Ruta">Ruta</option>
                  </select>
                </div>
              </li>
            </ul>

            <button class="btn" type="submit">Enviar</button>
          </form>
        </hgroup>

        <div id="respuesta-formualrio"></div>
      </section>

      <footer class="pie">DERECHOS RESERVADOS 2022-2023</footer>
    </div>
  </body>
</html>
